<!doctype html>

<div class="card">
  <div class="section-eyebrow">Etapa 5</div>
  <h3 class="card-title">
    Atendimento a Empreendimento com Múltiplas Torres ou Blocos
  </h3>
  <p class="card-sub" id="blocosSub"></p>

  <div class="grid grid-2" style="margin-bottom: 14px">
    <div class="field" data-noopt>
      <label id="nBlocosLabel">Nº de Torres</label>
      <input type="number" data-k="atend.nBlocos" oninput="onNBlocos(this)" />
    </div>
    <button
      class="btn btn-ghost"
      type="button"
      id="btnReplicarTorre1"
      style="align-self: end"
      onclick="replicarPrimeiro()"
    ></button>
  </div>

  <div id="blocosBox"></div>

  <div
    class="alert alert-info"
    id="aviso304Blocos"
    style="margin-top: 10px; display: none"
  >
    Demanda total acima de 304 kVA: o atendimento fica condicionado à
    apresentação do projeto elétrico com ART/TRT.
  </div>
</div>
<div class="nav-bottom no-print">
  <button class="btn btn-ghost" data-nav="prev">← Voltar</button>
  <button class="btn btn-primary" data-nav="next">Avançar →</button>
</div>
