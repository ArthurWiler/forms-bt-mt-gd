<!doctype html>

<div class="card">
  <div class="section-eyebrow">Etapa 5</div>
  <h3 class="card-title">Correspondência e Fatura</h3>
  <p class="card-sub">
    Escolha como e quando você deseja receber a conta de energia.
  </p>
  <div class="grid grid-2" id="correspNaoBox">
    <div class="field" data-noopt>
      <label>Como deseja receber a fatura?</label>
      <select data-k="corr.alternativa" onchange="onCorrAlternativaBT()">
        <option value="">Selecione</option>
        <option value="E-mail informado">E-mail informado</option>
        <option value="Endereço novo">Novo endereço</option>
        <option value="Mesmo da obra">Endereço da obra</option>
        <option value="Outro e-mail">Outro e-mail</option>
        <option value="Conta globalizada">
          Conta globalizada (poder público)
        </option>
      </select>
    </div>

    <div
      class="grid grid-2 col-span-2"
      id="corrEmailInformadoBox"
      style="display: none"
    >
      <div class="field">
        <label>E-mail para envio da fatura</label>
        <input type="email" data-k="prop.email" data-sem-vazio disabled />
      </div>
    </div>

    <div class="grid grid-2 col-span-2" id="corrObraAviso" style="display: none">
      <div class="field">
        <label>CEP</label>
        <div style="display: flex; gap: 8px; align-items: center">
          <div style="max-width: 180px">
            <input
              type="text"
              data-k="obra.cep"
              data-sem-vazio
              disabled
              placeholder="00000-000"
              oninput="onCepBT(this, 'obra')"
            />
          </div>
          <span id="cepStatusObra"></span>
        </div>
      </div>
      <div class="field col-span-2">
        <label>Rua / Av.</label>
        <input type="text" data-k="obra.endereco" data-sem-vazio disabled />
      </div>
      <div class="field">
        <label>Nº</label>
        <input type="text" data-k="obra.num" data-sem-vazio disabled />
      </div>
      <div class="field">
        <label>Complemento do endereço</label>
        <input type="text" data-k="obra.compl" />
      </div>
      <div class="field">
        <label>Bairro / Distrito</label>
        <input type="text" data-k="obra.bairro" data-sem-vazio disabled />
      </div>
      <div class="field">
        <label>Município</label>
        <input type="text" data-k="obra.cidade" data-sem-vazio disabled />
      </div>
      <div class="field">
        <label>Estado</label>
        <input type="text" data-k="obra.estado" data-sem-vazio disabled />
      </div>
    </div>
    <div class="grid grid-2 col-span-2" id="corrEmailBox" style="display: none">
      <div class="field">
        <label>E-mail para envio da fatura <span class="req">*</span></label>
        <input
          type="email"
          data-k="corr.outroEmail"
          placeholder="email@exemplo.com"
        />
      </div>
    </div>
    <div class="grid grid-2 col-span-2" id="corrEndBox" style="display: none">
      <div class="field">
        <label>CEP</label>
        <div style="display: flex; gap: 8px; align-items: center">
          <div style="max-width: 180px">
            <input
              type="text"
              data-k="corr.cep"
              placeholder="00000-000"
              oninput="onCepBT(this, 'corr')"
            />
          </div>
          <span id="cepStatusCorr"></span>
        </div>
      </div>
      <div class="field col-span-2">
        <label>Rua / Av.</label>
        <input type="text" data-k="corr.rua" placeholder=" " />
      </div>
      <div class="field">
        <label>Nº</label>
        <input type="text" data-k="corr.num" placeholder=" " />
      </div>
      <div class="field">
        <label>Complemento do endereço</label>
        <input type="text" data-k="corr.compl" placeholder=" " />
      </div>
      <div class="field">
        <label>Bairro / Distrito</label>
        <input type="text" data-k="corr.bairro" placeholder=" " />
      </div>
      <div class="field">
        <label>Município</label>
        <input type="text" data-k="corr.municipio" placeholder=" " />
      </div>
      <div class="field">
        <label>Estado</label>
        <input type="text" data-k="corr.estado" placeholder=" " />
      </div>
    </div>
    <div class="grid grid-2 col-span-2" id="contaGlobalBox" style="display: none">
      <div class="field">
        <label>
          Conta globalizada (código de débito automático globalizado)
          <span class="req">*</span>
        </label>
        <input type="text" data-k="corr.contaGlobal" placeholder="000000000" />
      </div>
    </div>

    <div class="field field--plain col-span-2" data-noopt>
      <label>Data de Vencimento da Fatura</label>
      <div data-toggle="corr.vencimento"></div>
      <select data-k="corr.vencimento" style="display: none" aria-hidden="true">
        <option value=""></option>
        <option>01</option>
        <option>06</option>
        <option>11</option>
        <option>17</option>
        <option>22</option>
        <option>27</option>
      </select>
    </div>
  </div>
</div>
<div class="nav-bottom no-print">
  <button class="btn btn-ghost" data-nav="prev">← Voltar</button>
  <button class="btn btn-primary" data-nav="next" data-gate="btCorrOk">
    Avançar →
  </button>
</div>
