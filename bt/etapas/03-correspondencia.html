<!-- Etapa 3 — Correspondência e Fatura (TabCorrespondencia). Vencimento e
     alternativas de recebimento são toggles (padrão .toggle-btn do BT) com
     select oculto data-k; os obrigatórios condicionais são validados pelo
     gate do botão (data-gate="btCorrOk") — toggles ocultos não contam nos
     marcadores por serem invisíveis. -->
<div class="card">
  <div class="section-eyebrow">Etapa 3</div>
  <h3 class="card-title">Correspondência e Fatura</h3>
  <p class="card-sub">
    Escolha como e quando você deseja receber a conta de energia.
  </p>
  <div class="grid">
    <div class="field field--plain" data-noopt>
      <label>Deseja receber a fatura no e-mail informado?</label>
      <div data-toggle="corr.receberEmail" data-toggle-onchange="onReceberEmailBT"></div>
      <select data-k="corr.receberEmail" style="display: none" aria-hidden="true">
        <option>Sim</option>
        <option>Não</option>
      </select>
    </div>
    <div class="field field--plain" data-noopt>
      <label>Data de Vencimento da Fatura</label>
      <div data-toggle="corr.vencimento"></div>
      <select data-k="corr.vencimento" style="display: none" aria-hidden="true">
        <option value=""></option>
        <option>01</option>
        <option>06</option>
        <option>11</option>
        <option>17</option>
        <option>22</option>
        <option>27</option>
      </select>
    </div>
  </div>
  <div class="divider" id="correspNaoBox" style="display: none">
    <div class="field field--plain" data-noopt>
      <label>Como deseja receber a fatura?</label>
      <div data-toggle="corr.alternativa" data-toggle-onchange="onCorrAlternativaBT"></div>
      <select data-k="corr.alternativa" style="display: none" aria-hidden="true">
        <option value="Endereço novo">Novo endereço</option>
        <option value="Mesmo da obra">Endereço da obra</option>
        <option value="Outro e-mail">Outro e-mail</option>
      </select>
    </div>
    <div class="alert alert-info" id="corrObraAviso" style="margin-top: 12px; display: none">
      A fatura será enviada para o endereço informado em
      <strong>Dados da Obra</strong>.
    </div>
    <div class="grid grid-2" id="corrEmailBox" style="margin-top: 12px; display: none">
      <div class="field col-span-2">
        <label>E-mail para envio da fatura <span class="req">*</span></label>
        <input type="email" data-k="corr.outroEmail" placeholder="email@exemplo.com" />
      </div>
    </div>
    <div class="grid grid-2" id="corrEndBox" style="margin-top: 12px; display: none">
      <div class="field">
        <label>CEP</label>
        <div style="display: flex; gap: 8px; align-items: center">
          <div style="max-width: 180px">
            <input
              type="text"
              data-k="corr.cep"
              placeholder="00000-000"
              oninput="onCepBT(this, 'corr')"
            />
          </div>
          <span id="cepStatusCorr"></span>
        </div>
      </div>
      <div class="field col-span-2">
        <label>Rua / Av.</label>
        <input type="text" data-k="corr.rua" placeholder=" " />
      </div>
      <div class="field">
        <label>Nº</label>
        <input type="text" data-k="corr.num" placeholder=" " />
      </div>
      <div class="field">
        <label>Complemento do endereço</label>
        <input type="text" data-k="corr.compl" placeholder=" " />
      </div>
      <div class="field">
        <label>Bairro / Distrito</label>
        <input type="text" data-k="corr.bairro" placeholder=" " />
      </div>
      <div class="field">
        <label>Município</label>
        <input type="text" data-k="corr.municipio" placeholder=" " />
      </div>
      <div class="field">
        <label>Estado</label>
        <input type="text" data-k="corr.estado" placeholder=" " />
      </div>
    </div>
    <div style="margin-top: 12px">
      <div class="field field--plain col-span-2" data-noopt>
        <label>Possui conta globalizada (poder público)?</label>
        <div data-toggle="corr.possuiContaGlobal" data-toggle-onchange="onContaGlobalBT"></div>
        <select data-k="corr.possuiContaGlobal" style="display: none" aria-hidden="true">
          <option>Sim</option>
          <option>Não</option>
        </select>
      </div>
      <div class="field col-span-2" id="contaGlobalBox" style="display: none">
        <label>
          Conta globalizada (código de débito automático globalizado)
          <span class="req">*</span>
        </label>
        <input type="text" data-k="corr.contaGlobal" placeholder="000000000" />
      </div>
    </div>
  </div>
</div>
<div class="nav-bottom no-print">
  <button class="btn btn-ghost" onclick="goTo(1)">← Voltar</button>
  <button class="btn btn-primary" onclick="goTo(3)" data-gate="btCorrOk">
    Avançar →
  </button>
</div>
