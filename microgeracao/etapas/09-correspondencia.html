<!doctype html>

<div class="card">
  <div class="section-eyebrow">Etapa 9</div>
  <h3 class="card-title">Correspondência e Fatura</h3>
  <p class="card-sub">
    Escolha como e quando você deseja receber a conta de energia.
  </p>
  <div class="grid grid-2" id="correspNaoBox">
    <div class="field" data-noopt>
      <label>Como deseja receber a fatura? <span class="req">*</span></label>
      <select data-k="corrAlternativa" onchange="onCorrAlternativa()">
        <option value="">Selecione</option>
        <option value="E-mail informado">E-mail informado</option>
        <option value="Endereço novo">Novo endereço</option>
        <option value="Mesmo da obra">Endereço da unidade</option>
        <option value="Outro e-mail">Outro e-mail</option>
        <option value="Conta globalizada">
          Conta globalizada (poder público)
        </option>
      </select>
    </div>
    <div class="field field--plain" data-noopt>
      <label>Data de Vencimento da Fatura <span class="req">*</span></label>
      <div id="cardsVencimento"></div>
      <select data-k="vencimento" style="display: none" aria-hidden="true">
        <option value=""></option>
        <option>01</option>
        <option>06</option>
        <option>11</option>
        <option>17</option>
        <option>22</option>
        <option>27</option>
      </select>
    </div>

    <div
      class="grid grid-2 col-span-2"
      id="corrEmailInformadoBox"
      style="display: none"
    >
      <div class="field col-span-2">
        <label>E-mail para envio da fatura</label>
        <input type="email" data-k="email" data-sem-vazio disabled />
      </div>
    </div>

    <div
      id="corrObraAviso"
      class="alert alert-info cmg-aviso col-span-2"
      style="margin-top: 12px; display: none"
    >
      <div class="cmg-aviso-icon" aria-hidden="true"></div>
      <p class="cmg-aviso-texto">
        A fatura será enviada para o endereço informado nos
        <strong>Dados da Unidade Consumidora</strong>.
      </p>
    </div>
    <div
      id="corrEmailBox"
      class="grid grid-2 col-span-2"
      style="margin-top: 12px; display: none"
    >
      <div class="field col-span-2">
        <label>E-mail para envio da fatura <span class="req">*</span></label>
        <input
          type="email"
          data-k="corrOutroEmail"
          placeholder="email@exemplo.com"
        />
      </div>
    </div>
    <div
      id="corrEndBox"
      class="grid grid-2 col-span-2"
      style="margin-top: 12px; display: none"
    >
      <div class="field">
        <label>CEP <span class="req">*</span></label>
        <input
          type="text"
          data-k="corrCep"
          placeholder="00000-000"
          oninput="onMascara(this, mascararCEP)"
        />
      </div>
      <div class="field">
        <label>Rua / Av. <span class="req">*</span></label>
        <input type="text" data-k="corrRua" placeholder=" " />
      </div>
      <div class="field">
        <label>Nº <span class="req">*</span></label>
        <input type="text" data-k="corrNum" placeholder=" " />
      </div>
      <div class="field">
        <label>Complemento do endereço</label>
        <input type="text" data-k="corrCompl" placeholder=" " />
      </div>
      <div class="field">
        <label>Bairro / Distrito <span class="req">*</span></label>
        <input type="text" data-k="corrBairro" placeholder=" " />
      </div>
      <div class="field">
        <label>Município <span class="req">*</span></label>
        <input type="text" data-k="corrMunicipio" placeholder=" " />
      </div>
      <div class="field">
        <label>Estado</label>
        <input type="text" data-k="corrEstado" placeholder=" " />
      </div>
    </div>
    <div
      class="grid grid-2 col-span-2"
      id="contaGlobalBox"
      style="display: none"
    >
      <div class="field col-span-2">
        <label>
          Conta globalizada (código de débito automático globalizado)
          <span class="req">*</span>
        </label>
        <input type="text" data-k="contaGlobal" placeholder="000000000" />
      </div>
    </div>
  </div>
</div>
<div class="nav-bottom no-print">
  <button class="btn btn-ghost" onclick="goTo(7)">← Voltar</button>
  <button class="btn btn-primary" onclick="goTo(9)">Avançar →</button>
</div>
